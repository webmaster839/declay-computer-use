services:
  - type: web
    name: declay-computer-use
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PARTSLINK_FIRMA
        sync: false
      - key: PARTSLINK_USER
        sync: false
      - key: PARTSLINK_PASS
        sync: false
