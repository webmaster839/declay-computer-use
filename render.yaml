services:
  - type: web
    name: declay-vision-server
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PARTSLINK_FIRMA
        sync: false
      - key: PARTSLINK_USER
        sync: false
      - key: PARTSLINK_PASS
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
